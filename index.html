<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>给涵涵的心意卡</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
@keyframes fadeIn { from { opacity: 0; transform: scale(.85); } to { opacity: 1; transform: scale(1); } }
@keyframes floatUp {
  0% { transform: translateY(100vh) rotate(0deg) scale(0); opacity: 0; }
  12% { opacity: .7; }
  88% { opacity: .6; }
  100% { transform: translateY(-10vh) rotate(720deg) scale(1); opacity: 0; }
}
@keyframes twinkle {
  0% { opacity: .15; transform: scale(.8); }
  100% { opacity: 1; transform: scale(1.2); }
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}
@keyframes glow {
  0%, 100% { text-shadow: 0 0 20px rgba(255,182,193,.5), 0 0 40px rgba(255,182,193,.3); }
  50% { text-shadow: 0 0 30px rgba(255,182,193,.8), 0 0 60px rgba(255,182,193,.5), 0 0 80px rgba(255,105,180,.3); }
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes heartBeat {
  0% { transform: scale(1); }
  15% { transform: scale(1.3); }
  30% { transform: scale(1); }
  45% { transform: scale(1.15); }
  60% { transform: scale(1); }
}
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'PingFang SC', 'Microsoft YaHei', 'STKaiti', serif;
  background: #1a0a1e;
  display: flex; align-items: center; justify-content: center;
}
/* ===== Background gradient ===== */
.bg-layer {
  position: fixed; inset: 0;
  background: linear-gradient(135deg, #1a0a1e 0%, #2d1b3d 25%, #4a1942 50%, #2d1b3d 75%, #1a0a1e 100%);
  z-index: 0;
}
.bg-layer::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(255,105,180,.15) 0%, transparent 60%);
}

/* ===== Stars ===== */
.stars-container { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
.star {
  position: absolute; width: 3px; height: 3px; background: #fff; border-radius: 50%;
  animation: twinkle 3s ease-in-out infinite alternate;
}

/* ===== Floating hearts ===== */
.hearts-container { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
.heart {
  position: absolute; animation: floatUp 8s linear infinite; opacity: 0;
  font-size: 24px; filter: drop-shadow(0 0 6px rgba(255,105,180,.4));
}

/* ===== Card ===== */
.card-wrapper {
  position: relative; z-index: 2;
  width: 92%; max-width: 420px;
  animation: fadeIn 1.2s ease;
}
.card {
  background: rgba(255,255,255,.06);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 28px;
  padding: 40px 28px 36px;
  border: 1px solid rgba(255,255,255,.12);
  box-shadow: 0 20px 60px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.1);
  text-align: center;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
  background: conic-gradient(from 0deg, transparent, rgba(255,105,180,.03), transparent, rgba(200,150,255,.03), transparent);
  animation: spin 20s linear infinite;
  z-index: 0;
}
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.card > * { position: relative; z-index: 1; }

/* ===== Hearts decoration ===== */
.hearts-deco {
  font-size: 32px; margin-bottom: 12px;
  animation: heartBeat 1.8s ease-in-out infinite;
  letter-spacing: 8px;
}

/* ===== Title ===== */
.title {
  font-size: clamp(28px, 7vw, 40px);
  font-weight: 800;
  color: #fff;
  animation: glow 3s ease-in-out infinite;
  margin-bottom: 8px;
  line-height: 1.3;
}

/* ===== Subtitle / Message ===== */
.message {
  font-size: clamp(15px, 4vw, 19px);
  color: rgba(255,255,255,.88);
  line-height: 2;
  margin: 16px 0 8px;
  white-space: pre-wrap;
  letter-spacing: 1px;
  font-weight: 300;
}
.message span {
  display: inline-block; opacity: 0;
  animation: slideUp .5s ease forwards;
}

/* ===== From ===== */
.from-name {
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,.1);
  font-size: 15px;
  color: rgba(255,255,255,.6);
  letter-spacing: 2px;
}

/* ===== Music button ===== */
.music-btn {
  margin-top: 28px;
  width: 52px; height: 52px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,.2);
  background: rgba(255,255,255,.08);
  color: #fff; font-size: 22px;
  cursor: pointer;
  transition: all .3s;
  display: inline-flex; align-items: center; justify-content: center;
  backdrop-filter: blur(10px);
}
.music-btn:active { transform: scale(.9); }
.music-btn.playing { border-color: rgba(255,105,180,.5); }
.music-icon { display: inline-block; }
.music-btn.playing .music-icon { animation: spin 2s linear infinite; }

/* ===== Share hint ===== */
.share-hint {
  margin-top: 16px;
  font-size: 12px; color: rgba(255,255,255,.25);
  letter-spacing: 1px;
}

/* ===== Bottom decorations ===== */
.bottom-deco {
  position: fixed; bottom: 0; left: 0; width: 100%; height: 120px;
  background: linear-gradient(to top, rgba(255,105,180,.06), transparent);
  pointer-events: none; z-index: 1;
}

/* ===== Hearts burst (click effect) ===== */
.burst-container { position: fixed; inset: 0; pointer-events: none; z-index: 100; }
.burst-heart {
  position: absolute; font-size: 20px;
  animation: burstOut 1.2s ease-out forwards;
}
@keyframes burstOut {
  0% { transform: translate(0,0) scale(0) rotate(0deg); opacity: 1; }
  100% { transform: translate(var(--tx), var(--ty)) scale(1.5) rotate(360deg); opacity: 0; }
}

/* ===== Snow overlay ===== */
@media (max-width: 480px) {
  .card { padding: 32px 20px 28px; border-radius: 22px; }
}
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="stars-container" id="starsContainer"></div>
<div class="hearts-container" id="heartsContainer"></div>
<div class="bottom-deco"></div>

<div class="card-wrapper">
  <div class="card" onclick="burstHearts(event)">
    <div class="hearts-deco">💗 💗 💗</div>
    <div class="title" id="mainTitle"></div>
    <div class="message" id="mainMessage"></div>
    <div class="from-name" id="mainFrom"></div>
    <button class="music-btn" id="musicBtn">
      <span class="music-icon">♫</span>
    </button>
    <div class="share-hint">点击画面任意位置有惊喜 ✨</div>
  </div>
</div>

<div class="burst-container" id="burstContainer"></div>

<audio id="bgMusic" loop preload="none"></audio>

<script>
// ===== CONFIG =====
const config = {
  title: '涵涵，我们有个家吧',
  message: '想每天早上睁开眼就看到你\n想和你一起挑窗帘的颜色\n想在周末的午后窝在沙发里\n\n余生很长\n我想和你一起度过',
  from: '爱你的 💕',
  musicUrl: '', // 如果有音乐外链可以填在这里
};

// ===== INIT =====
function init() {
  createStars(80);
  createFloatingHearts(20);
  typeWriter();
  setupMusic();
  setupBurst();
}
init();

// ===== STARS =====
function createStars(count) {
  const c = document.getElementById('starsContainer');
  for (let i = 0; i < count; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    const size = 1 + Math.random() * 3;
    s.style.width = size + 'px';
    s.style.height = size + 'px';
    s.style.animationDelay = Math.random() * 4 + 's';
    s.style.animationDuration = (1.5 + Math.random() * 2.5) + 's';
    c.appendChild(s);
  }
}

// ===== FLOATING HEARTS =====
function createFloatingHearts(count) {
  const c = document.getElementById('heartsContainer');
  const symbols = ['💗', '❤', '💕', '💖', '💝', '💘', '🩷'];
  for (let i = 0; i < count; i++) {
    const h = document.createElement('div');
    h.className = 'heart';
    h.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    h.style.left = Math.random() * 100 + '%';
    h.style.fontSize = (16 + Math.random() * 18) + 'px';
    h.style.animationDelay = Math.random() * 8 + 's';
    h.style.animationDuration = (7 + Math.random() * 4) + 's';
    c.appendChild(h);
  }
  // Continuously replenish
  setInterval(() => {
    if (c.children.length < count) {
      const h = document.createElement('div');
      h.className = 'heart';
      h.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      h.style.left = Math.random() * 100 + '%';
      h.style.fontSize = (16 + Math.random() * 18) + 'px';
      h.style.animationDuration = (7 + Math.random() * 4) + 's';
      c.appendChild(h);
      // Remove after animation
      setTimeout(() => h.remove(), 12000);
    }
  }, 2000);
}

// ===== TYPEWRITER EFFECT =====
function typeWriter() {
  const titleEl = document.getElementById('mainTitle');
  const msgEl = document.getElementById('mainMessage');
  const fromEl = document.getElementById('mainFrom');

  // Set title immediately
  titleEl.textContent = config.title;

  // Set from
  fromEl.textContent = `—— ${config.from}`;

  // Type out message character by character
  const fullText = config.message;
  msgEl.textContent = '';
  let i = 0;
  const speed = 45;

  function type() {
    if (i < fullText.length) {
      msgEl.textContent += fullText.charAt(i);
      i++;
      // Variable speed: pause longer at newlines
      const delay = fullText.charAt(i - 1) === '\n' ? 300 : speed;
      setTimeout(type, delay);
    }
  }

  // Start typing after a short delay
  setTimeout(type, 500);
}

// ===== MUSIC =====
function setupMusic() {
  const btn = document.getElementById('musicBtn');
  const audio = document.getElementById('bgMusic');

  if (config.musicUrl) {
    audio.src = config.musicUrl;
    btn.style.display = 'inline-flex';
  } else {
    // No music URL configured — just visual toggle
    btn.style.display = 'inline-flex';
    btn.style.opacity = '0.4';
    btn.title = '暂无背景音乐';
    // Still allow click for burst effect later
  }

  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    if (config.musicUrl) {
      if (audio.paused) {
        audio.play().catch(() => {});
        this.classList.add('playing');
      } else {
        audio.pause();
        this.classList.remove('playing');
      }
    }
  });
}

// ===== BURST HEARTS ON CLICK =====
function setupBurst() {
  document.addEventListener('click', burstHearts);
}

function burstHearts(e) {
  const container = document.getElementById('burstContainer');
  const symbols = ['💗', '❤', '💕', '💖', '💝', '💘', '🩷', '✨'];
  const count = 10 + Math.floor(Math.random() * 8);

  const x = e.clientX || window.innerWidth / 2;
  const y = e.clientY || window.innerHeight / 2;

  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'burst-heart';
    el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    const angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.5;
    const dist = 80 + Math.random() * 120;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    el.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    el.style.fontSize = (16 + Math.random() * 18) + 'px';
    container.appendChild(el);
    setTimeout(() => el.remove(), 1200);
  }
}

// ===== RESPONSIVE HEIGHT =====
window.addEventListener('load', () => {
  document.body.style.minHeight = window.innerHeight + 'px';
});
</script>
</body>
</html>
